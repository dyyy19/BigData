<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload — NTU Archive</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f6f8;
    color: #1a1a1a;
  }
  header {
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-size: 18px; }
  header a {
    font-size: 13px;
    color: #2563eb;
    text-decoration: none;
  }
  .container {
    max-width: 560px;
    margin: 40px auto;
    padding: 0 20px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    padding: 32px;
  }
  .card h2 { font-size: 18px; margin-bottom: 4px; }
  .card .subtitle { font-size: 13px; color: #666; margin-bottom: 24px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    margin-top: 16px;
  }
  input, select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    background: #fff;
  }
  input:focus, select:focus { outline: none; border-color: #2563eb; }
  input[type="file"] {
    padding: 8px;
    background: #fafafa;
  }
  button {
    width: 100%;
    margin-top: 24px;
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #1d4ed8; }
  button:disabled { background: #93b4f0; cursor: not-allowed; }
  .message {
    margin-top: 16px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
  }
  .message.error { background: #fef2f2; color: #b91c1c; display: block; }
  .message.success { background: #f0fdf4; color: #15803d; display: block; }
  .hint { font-size: 12px; color: #999; margin-top: 4px; }
</style>
</head>
<body>

<header>
  <h1>📚 NTU Archive</h1>
  <a href="browse.html">← Back to Browse</a>
</header>

<div class="container">
  <div class="card">
    <h2>Upload a resource</h2>
    <p class="subtitle">Share a past exam, homework, or project to help other students.</p>

    <form id="uploadForm">
      <label for="title">Title</label>
      <input type="text" id="title" placeholder="2023 Midterm — Calculus" required>

      <label for="courseCode">Course code</label>
      <input type="text" id="courseCode" placeholder="MATH1001" required>

      <label for="department">Department</label>
      <select id="department" required>
        <option value="">Select department</option>
        <option value="9010 - Electrical Engineering">9010 - Electrical Engineering</option>
        <option value="9020 - Computer Science & Information Engineering">9020 - Computer Science & Information Engineering</option>
        <option value="9210 - Graduate Institute of Electrical Engineering">9210 - Graduate Institute of Electrical Engineering</option>
        <option value="0020 - Mathematics">0020 - Mathematics</option>
        <option value="0030 - Physics">0030 - Physics</option>
        <option value="0040 - Chemistry">0040 - Chemistry</option>
        <option value="1010 - Civil Engineering">1010 - Civil Engineering</option>
        <option value="1020 - Mechanical Engineering">1020 - Mechanical Engineering</option>
        <option value="2010 - Business Administration">2010 - Business Administration</option>
        <option value="2020 - Economics">2020 - Economics</option>
        <option value="Other">Other</option>
      </select>

      <label for="semester">Semester</label>
      <input type="text" id="semester" placeholder="2023 Spring" required>

      <label for="type">Type</label>
      <select id="type" required>
        <option value="">Select type</option>
        <option value="exam">Exam</option>
        <option value="hw">Homework</option>
        <option value="project">Project</option>
      </select>

      <label for="file">File (PDF)</label>
      <input type="file" id="file" accept="application/pdf" required>
      <p class="hint">Max 10MB. PDF only.</p>

      <button type="submit" id="submitBtn">Upload</button>
    </form>

    <div class="message" id="message"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://cuvtymychiiwhchxgmnh.supabase.co";
  const SUPABASE_KEY = "sb_publishable_GK5vdltD9OWlwey_mtvtjg_zlfdOBy_";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      window.location.href = "index.html";
      return;
    }
    currentUser = session.user;
  }

  function showMessage(text, type) {
    const el = document.getElementById("message");
    el.textContent = text;
    el.className = "message " + type;
  }

  document.getElementById("uploadForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const title = document.getElementById("title").value.trim();
    const courseCode = document.getElementById("courseCode").value.trim();
    const department = document.getElementById("department").value;
    const semester = document.getElementById("semester").value.trim();
    const type = document.getElementById("type").value;
    const fileInput = document.getElementById("file");
    const file = fileInput.files[0];

    if (!file) {
      showMessage("Please select a file.", "error");
      return;
    }
    if (file.size > 10 * 1024 * 1024) {
      showMessage("File too large. Max 10MB.", "error");
      return;
    }

    const submitBtn = document.getElementById("submitBtn");
    submitBtn.disabled = true;
    submitBtn.textContent = "Uploading...";

    try {
      // 1. Upload file to Supabase Storage
      const fileExt = file.name.split(".").pop();
      const filePath = `${currentUser.id}/${Date.now()}_${courseCode.replace(/\s+/g, "_")}.${fileExt}`;

      const { data: uploadData, error: uploadError } = await sb.storage
        .from("exam-files")
        .upload(filePath, file);

      if (uploadError) throw uploadError;

      // 2. Get public URL for the uploaded file
      const { data: publicUrlData } = sb.storage
        .from("exam-files")
        .getPublicUrl(filePath);

      const fileUrl = publicUrlData.publicUrl;

      // 3. Insert metadata row into resources table
      const { data: resourceData, error: insertError } = await sb
        .from("resources")
        .insert({
          title,
          course_code: courseCode,
          department,
          semester,
          type,
          file_url: fileUrl,
          uploaded_by: currentUser.id
        })
        .select()
        .single();

      if (insertError) throw insertError;

      // 4. Log the contribution (powers the freemium gate later)
      await sb.from("contributions").insert({
        user_id: currentUser.id,
        resource_id: resourceData.id
      });

      // 5. Award merits for uploading
      await sb.rpc("award_upload_merit");

      showMessage("Upload successful! +10 merits. Redirecting...", "success");
      setTimeout(() => { window.location.href = "browse.html"; }, 1000);

    } catch (err) {
      showMessage("Upload failed: " + err.message, "error");
      submitBtn.disabled = false;
      submitBtn.textContent = "Upload";
    }
  });

  init();
</script>

</body>
</html>
